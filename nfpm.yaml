name: ssh-watcher
arch: amd64
platform: linux
version: "${VERSION}"
maintainer: "Margulan Moldabekov <moldabekov@gmail.com>"
description: "SSH connection monitoring daemon with eBPF, desktop notifications, and webhooks"
vendor: "Margulan Moldabekov"
license: MIT
homepage: "https://github.com/moldabekov/ssh-watcher"

contents:
  - src: ssh-watcher
    dst: /usr/bin/ssh-watcher
    file_info:
      mode: 0755

  - src: config/ssh-watcher.toml
    dst: /etc/ssh-watcher/config.toml
    type: config|noreplace
    file_info:
      mode: 0644

  - src: config/ssh-watcher.service
    dst: /usr/lib/systemd/system/ssh-watcher.service
    file_info:
      mode: 0644

scripts:
  postinstall: packaging/postinstall.sh
  preremove: packaging/preremove.sh
