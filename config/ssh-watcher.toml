# SSH Watcher configuration
# System-wide: /etc/ssh-watcher/config.toml
# Per-user:    ~/.config/ssh-watcher/config.toml

[detection]
backend = "journal"				# "auto", "ebpf", "journal", "logfile", "utmp"
ssh_port = 22
auth_timeout_seconds = 30			# for logfile/journal auth_failure inference

[events]
notify_on_connection = true			# "low", "normal", "critical"
notify_on_auth_success = true
notify_on_auth_failure = true
notify_on_disconnect = true

[desktop]
enabled = true
urgency_connection = "low"
urgency_success = "critical"
urgency_failure = "normal"
urgency_disconnect = "low"
# template vars: {event_type}, {username}, {source_ip}, {source_port}, {timestamp}, {session_id}, {pid}, {hostname}
title_template = "SSH: {event_type}"
body_template = "{username}@{source_ip}"

[log]
enabled = false
path = "/var/log/ssh-watcher.log"

[webhook]
enabled = false

