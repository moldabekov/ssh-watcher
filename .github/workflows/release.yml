name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"
  ELOGIND_VERSION: "255.22"
  LIBBPF_VERSION: "v1.7.0"
  UPX_VERSION: "5.1.1"

jobs:
  build-static:
    name: Static build (x86_64 musl)
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.21
    steps:
      - name: Install Alpine build deps
        run: |
          apk add --no-cache \
            git curl xz tar bash coreutils \
            build-base clang llvm meson ninja pkgconf \
            linux-headers musl-dev \
            zlib-dev zlib-static \
            elfutils-dev \
            libcap-dev libcap-static \
            elogind-dev util-linux-dev eudev-dev \
            zstd-dev zstd-static util-linux-static \
            dbus-dev acl-dev libseccomp-dev linux-pam-dev pcre2-dev m4 binutils \
            python3 py3-jinja2 gperf gettext-dev

      - uses: actions/checkout@v4

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: zig-x86_64-linux-${{ env.ZIG_VERSION }}
          key: zig-alpine-${{ env.ZIG_VERSION }}
      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: curl -L "https://ziglang.org/download/$ZIG_VERSION/zig-x86_64-linux-$ZIG_VERSION.tar.xz" | tar xJ
      - name: Add Zig to PATH
        run: echo "$PWD/zig-x86_64-linux-$ZIG_VERSION" >> "$GITHUB_PATH"

      - name: Install UPX
        run: apk add --no-cache upx

      - name: Cache musl sysroot
        id: cache-sysroot
        uses: actions/cache/restore@v4
        with:
          path: /tmp/musl-sysroot
          key: musl-alpine-elogind-${{ env.ELOGIND_VERSION }}-${{ env.LIBBPF_VERSION }}-v32

      - name: Build musl sysroot
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -ex
          SYSROOT=/tmp/musl-sysroot
          mkdir -p "$SYSROOT"/{lib,include}

          # Copy Alpine's system static libs + headers
          for lib in libz.a libelf.a libcap.a libzstd.a libmount.a libblkid.a libudev.a; do
            cp "/usr/lib/$lib" "$SYSROOT/lib/" 2>/dev/null || true
          done
          cp /usr/include/libelf.h /usr/include/gelf.h "$SYSROOT/include/" 2>/dev/null || true

          # --- libbpf ---
          git clone --depth=1 -b "$LIBBPF_VERSION" https://github.com/libbpf/libbpf /tmp/libbpf
          cd /tmp/libbpf/src
          make -j"$(nproc)" BUILD_STATIC_ONLY=1 \
            OBJDIR=/tmp/libbpf-build DESTDIR="$SYSROOT" prefix=/ LIBDIR=/lib install
          cd -

          # --- elogind (provides libsystemd-compatible API, musl-native) ---
          # Use Alpine's version + their musl compatibility patches
          ALPINE_APORTS="https://gitlab.alpinelinux.org/alpine/aports/-/raw/master/community/elogind"
          git clone --depth=1 -b "V$ELOGIND_VERSION" https://github.com/elogind/elogind /tmp/elogind
          cd /tmp/elogind
          # Apply ALL Alpine musl patches
          for patch_file in $(curl -sL "$ALPINE_APORTS/APKBUILD" | grep '^\t0' | tr -d '\t'); do
            echo "Applying $patch_file"
            curl -sL "$ALPINE_APORTS/$patch_file" | patch -p1 || true
          done
          LDFLAGS="-lintl" meson setup build \
            --default-library=static \
            -Dman=false \
            -Dtests=false \
            -Dutmp=false
          # Full build like Alpine — ignore daemon link errors
          meson compile -C build || true
          # Collect ALL compiled objects into fat archive
          mkdir -p /tmp/elogind-objs && cd /tmp/elogind-objs
          # Include only library objects (*.a.p/ dirs) — no executable objects
          find /tmp/elogind/build -path '*.a.p/*.o' | while read f; do
            cp "$f" . 2>/dev/null || true
          done
          echo "=== elogind objects: $(ls -a *.o .*.o 2>/dev/null | wc -l) ==="
          ar rcs "$SYSROOT/lib/libelogind.a" *.o .*.o
          cd /tmp/elogind
          cp "$SYSROOT/lib/libelogind.a" "$SYSROOT/lib/libsystemd.a"
          ls -la "$SYSROOT/lib/"*.a
          # elogind's headers are sd-journal compatible
          mkdir -p "$SYSROOT/include/systemd"
          cp /usr/include/elogind/sd-journal.h "$SYSROOT/include/systemd/"
          cp /usr/include/elogind/sd-id128.h "$SYSROOT/include/systemd/"
          cp /usr/include/elogind/_sd-common.h "$SYSROOT/include/systemd/"
          cd -

          echo "=== Sysroot ==="
          find "$SYSROOT/lib" -name '*.a' | sort

      - name: Save musl sysroot cache
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/musl-sysroot
          key: musl-alpine-elogind-${{ env.ELOGIND_VERSION }}-${{ env.LIBBPF_VERSION }}-v32

      - name: Build ssh-watcher (fully static)
        run: zig build release-static -Dmusl-sysroot=/tmp/musl-sysroot

      - name: Verify binary
        run: |
          BIN=zig-out/release/ssh-watcher-x86_64-linux-static
          file "$BIN"
          ls -lh "$BIN"
          ldd "$BIN" 2>&1 || echo "Not a dynamic executable (fully static)"
          readelf -d "$BIN" 2>&1 | grep NEEDED || echo "Fully static - no NEEDED entries"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-watcher-x86_64-linux-static
          path: zig-out/release/ssh-watcher-x86_64-linux-static

  build-dynamic:
    name: Dynamic build (x86_64 glibc)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: clang llvm libsystemd-dev libbpf-dev
          version: v1

      - name: Cache Zig
        id: cache-zig-dyn
        uses: actions/cache@v4
        with:
          path: zig-x86_64-linux-${{ env.ZIG_VERSION }}
          key: zig-ubuntu-${{ env.ZIG_VERSION }}
      - name: Install Zig
        if: steps.cache-zig-dyn.outputs.cache-hit != 'true'
        run: curl -L "https://ziglang.org/download/$ZIG_VERSION/zig-x86_64-linux-$ZIG_VERSION.tar.xz" | tar xJ
      - name: Add Zig to PATH
        run: echo "$PWD/zig-x86_64-linux-$ZIG_VERSION" >> "$GITHUB_PATH"

      - name: Cache UPX
        id: cache-upx-dyn
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/upx
          key: upx-${{ env.UPX_VERSION }}
      - name: Install UPX
        if: steps.cache-upx-dyn.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/upx/upx/releases/download/v$UPX_VERSION/upx-$UPX_VERSION-amd64_linux.tar.xz" | tar xJ
          sudo cp "upx-$UPX_VERSION-amd64_linux/upx" /usr/local/bin/

      - name: Build
        run: zig build release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-watcher-x86_64-linux
          path: zig-out/release/ssh-watcher-x86_64-linux

  release:
    name: Create release
    needs: [build-static, build-dynamic]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/ssh-watcher-x86_64-linux-static/ssh-watcher-x86_64-linux-static
            artifacts/ssh-watcher-x86_64-linux/ssh-watcher-x86_64-linux
